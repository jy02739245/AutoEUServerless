name: Auto EUserv

on:
  schedule:
    - cron: '0 12 */3 * *'  # 每 3 天 UTC 时间 12:00 运行
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@main

    - name: Set up Python
      uses: actions/setup-python@main
      with:
        python-version: '3.12'  # ddddocr/onnxruntime 在 3.12 下更稳定

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pillow ddddocr==1.6.1

    - name: Run script
      env:
        EUSERV_USERNAME: ${{ secrets.EUSERV_USERNAME }}
        EUSERV_PASSWORD: ${{ secrets.EUSERV_PASSWORD }}
        TRUECAPTCHA_USERID: ${{ secrets.TRUECAPTCHA_USERID }}
        TRUECAPTCHA_APIKEY: ${{ secrets.TRUECAPTCHA_APIKEY }}
        ENABLE_DDDDOCR_OCR: "true"
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_USER_ID: ${{ secrets.TG_USER_ID }}
        MAILPARSER_DOWNLOAD_URL_ID: ${{ secrets.MAILPARSER_DOWNLOAD_URL_ID }}
      run: python Github_Action.py

    - name: Upload captcha images
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: login-captcha-images
        path: captcha_images/*.png
        if-no-files-found: ignore
        retention-days: 7
